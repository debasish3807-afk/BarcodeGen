global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "barcodegen-app"
    static_configs:
      - targets: ["app:3000"]
    metrics_path: /api/health
    scheme: http

  - job_name: "nginx"
    static_configs:
      - targets: ["nginx:80"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
